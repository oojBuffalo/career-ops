# ── Job Boards ────────────────────────────────────────────────────────
# Multi-employer aggregators. Unlike tracked_companies (one entry = one employer),
# job boards return offers from many companies in a single API call.
# Same title/location filtering and dedup apply.

job_boards:

  # ── US / global remote-job feeds ───────────────────────────────────
  # Zero-token public feeds. Title/location filtering and dedup apply, so the
  # location_filter above keeps results US-focused. No careers_url or extra
  # fields needed — just provider + enabled.

  - name: RemoteOK
    provider: remoteok
    enabled: true
    notes: "Global remote-job feed. Use location_filter to keep US-based roles."

  - name: Remotive
    provider: remotive
    enabled: true
    notes: "Global remote-job feed (tech-heavy). Use location_filter for US-based roles."

  - name: We Work Remotely
    provider: weworkremotely
    enabled: false
    notes: "Global remote-job feed. Use location_filter for US-based roles."

  - name: Working Nomads
    provider: workingnomads
    enabled: false
    notes: "Global remote-job feed. Use location_filter for US-based roles."
